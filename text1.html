<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properly Aligned Form Controls</title>
    <style>
        /* Base styles and reset */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Form container */
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        /* Row layout for clean grid alignment */
        .form-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        /* Labels styling */
        .form-row label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }

        /* Universal styling for fields to ensure uniform width */
        .form-row input[type="text"],
        .form-row select,
        .form-row input[list] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Includes padding in overall width */
            font-size: 14px;
        }

        /* Focus state styling */
        .form-row input:focus, 
        .form-row select:focus {
            border-color: #4a90e2;
            outline: none;
        }

        /* Listbox-specific styling */
        .form-row select[multiple] {
            height: 100px; /* Gives the list box room to show multiple options */
            padding: 5px;
        }

        /* Inline alignment rules specifically for the Checkbox row */
        .checkbox-row {
            flex-direction: row;
            align-items: center; /* Vertically centers checkbox with text */
            cursor: pointer;
        }

        .checkbox-row input[type="checkbox"] {
            margin-right: 10px; /* Space between box and text */
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-row label {
            margin-bottom: 0; /* Clears standard block label spacing */
            cursor: pointer;
        }

        /* Submit Button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Application Form</h2>
        <form>
            
            <!-- 1. TEXT FIELD -->
            <div class="form-row">
                <label for="username">Full Name (Text Field):</label>
                <input type="text" id="username" name="username" placeholder="Enter your name">
            </div>

            <!-- 2. COMBOBOX (Text field with dropdown menu choices) -->
            <div class="form-row">
                <label for="browser-choice">Preferred Browser (Combobox):</label>
                <input list="browsers" id="browser-choice" name="browser-choice" placeholder="Type or select...">
                <datalist id="browsers">
                    <option value="Google Chrome">
                    <option value="Mozilla Firefox">
                    <option value="Microsoft Edge">
                    <option value="Safari">
                    <option value="Opera">
                </datalist>
            </div>

            <!-- 3. LIST BOX (Select element with multiple attribute) -->
            <div class="form-row">
                <label for="skills">Skills (List Box - Hold Ctrl/Cmd to select multiple):</label>
                <select id="skills" name="skills" multiple>
                    <option value="html">HTML5</option>
                    <option value="css">CSS3</option>
                    <option value="js">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="sql">SQL Database</option>
                </select>
            </div>

            <!-- 4. CHECKBOX -->
            <div class="form-row checkbox-row">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">I agree to the terms and conditions (Checkbox)</label>
            </div>

            <!-- SUBMIT -->
            <button type="submit">Submit Form</button>

        </form>
    </div>

</body>
</html>
